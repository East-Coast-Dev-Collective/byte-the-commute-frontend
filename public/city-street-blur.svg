<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1a2f"/>
      <stop offset="55%" stop-color="#122742"/>
      <stop offset="100%" stop-color="#1a324f"/>
    </linearGradient>
    <filter id="blurSoft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="blurStrong" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="34"/>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>

  <!-- Building glow blocks -->
  <g filter="url(#blurStrong)" opacity="0.34">
    <rect x="40" y="140" width="180" height="520" fill="#1f4f7a"/>
    <rect x="260" y="80" width="220" height="620" fill="#2d5c89"/>
    <rect x="540" y="170" width="200" height="500" fill="#1f4f7a"/>
    <rect x="1170" y="120" width="190" height="540" fill="#2a5a86"/>
    <rect x="1400" y="70" width="230" height="640" fill="#2f628f"/>
    <rect x="1670" y="150" width="180" height="500" fill="#245581"/>
  </g>

  <!-- Street light bokeh -->
  <g filter="url(#blurSoft)" opacity="0.56">
    <circle cx="220" cy="780" r="52" fill="#ffd45f"/>
    <circle cx="390" cy="820" r="66" fill="#ff9f5a"/>
    <circle cx="620" cy="780" r="58" fill="#56d3ff"/>
    <circle cx="860" cy="845" r="72" fill="#ffc266"/>
    <circle cx="1110" cy="800" r="60" fill="#65e2ff"/>
    <circle cx="1360" cy="850" r="68" fill="#ffb768"/>
    <circle cx="1590" cy="790" r="56" fill="#69dbff"/>
    <circle cx="1760" cy="840" r="72" fill="#ff9f5f"/>
  </g>

  <!-- Lane streaks / motion blur -->
  <g filter="url(#blurSoft)" opacity="0.48">
    <path d="M 900 1080 L 760 620" stroke="#ffe18a" stroke-width="16" stroke-linecap="round"/>
    <path d="M 980 1080 L 930 620" stroke="#ffd26a" stroke-width="14" stroke-linecap="round"/>
    <path d="M 1040 1080 L 1120 620" stroke="#7be1ff" stroke-width="12" stroke-linecap="round"/>
    <path d="M 1120 1080 L 1300 620" stroke="#56d6ff" stroke-width="11" stroke-linecap="round"/>
  </g>

  <!-- Faint traffic glow haze -->
  <ellipse cx="960" cy="930" rx="880" ry="190" fill="#8ccfff" opacity="0.09" filter="url(#blurStrong)"/>
</svg>
